<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria do Corinthians</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #ffffff;
            font-size: 3em;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 3px 3px 0 #cccccc;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
        }

        h1::before, h1::after {
            content: "★";
            color: #ffffff;
            font-size: 0.8em;
            margin: 0 15px;
            opacity: 0.7;
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 2px solid #ffffff20;
        }

        .card {
            background: #ffffff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 3px solid #ffffff;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .card-info {
            padding: 15px;
            background: linear-gradient(to right, #000000, #1a1a1a);
            color: #ffffff;
        }

        .card-info h3 {
            font-size: 1.1em;
            margin-bottom: 5px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-info p {
            font-size: 0.9em;
            color: #cccccc;
        }

        .legenda {
            margin-top: 30px;
            color: #ffffff;
            font-size: 1.1em;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid #ffffff40;
        }

        .legenda i {
            color: #ffffff;
            margin: 0 5px;
        }

        /* Responsividade */
        @media (max-width: 900px) {
            .galeria {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            
            h1 {
                font-size: 2.5em;
            }
            
            h1::before, h1::after {
                display: none;
            }
        }

        @media (max-width: 600px) {
            .galeria {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .card img {
                height: 200px;
            }
        }

        /* Efeito de brilho nos cards */
        .card {
            position: relative;
        }

        .card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            transition: 0.5s;
            opacity: 0;
        }

        .card:hover::after {
            opacity: 1;
            animation: shine 1.5s ease;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CORINTHIANS</h1>
        
        <div class="galeria">
            <!-- Card 1 -->
            <div class="card">
                <img src="https://a.espncdn.com/i/teamlogos/soccer/500/874.png" alt="Imagem Corinthians 1">
                <div class="card-info">
                    <h3>Timão</h3>
                    <p>O Todo Poderoso</p>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="card">
                <img src="https://via.placeholder.com/400x300/000000/ffffff?text=TERCEIRO+TEMPO" alt="Imagem Corinthians 2">
                <div class="card-info">
                    <h3>Terçeiro Tempo</h3>
                    <p>Raça Corinthiana</p>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="card">
                <img src="https://via.placeholder.com/400x300/000000/ffffff?text=FAZENDA" alt="Imagem Corinthians 3">
                <div class="card-info">
                    <h3>Fazendinha</h3>
                    <p>Nossa Casa</p>
                </div>
            </div>

            <!-- Card 4 -->
            <div class="card">
                <img src="https://via.placeholder.com/400x300/000000/ffffff?text=ARENA" alt="Imagem Corinthians 4">
                <div class="card-info">
                    <h3>Arena Corinthians</h3>
                    <p>Itaquerão</p>
                </div>
            </div>

            <!-- Card 5 -->
            <div class="card">
                <img src="https://via.placeholder.com/400x300/000000/ffffff?text=MUNDIAL" alt="Imagem Corinthians 5">
                <div class="card-info">
                    <h3>Mundial 2012</h3>
                    <p>Campeão do Mundo</p>
                </div>
            </div>

            <!-- Card 6 -->
            <div class="card">
                <img src="https://via.placeholder.com/400x300/000000/ffffff?text=BRASILEIRAO" alt="Imagem Corinthians 6">
                <div class="card-info">
                    <h3>Heptacampeão</h3>
                    <p>Brasileirão</p>
                </div>
            </div>
        </div>

        <div class="legenda">
            <i>⚫</i> 6 IMAGENS - 3 COLUNAS x 2 LINHAS <i>⚪</i>
        </div>
    </div>

    <script>
        // Script opcional para interatividade
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', () => {
                const titulo = card.querySelector('h3').innerText;
                alert(`Você clicou em: ${titulo} - Squadre!`);
            });
        });
    </script>
</body>
</html>
